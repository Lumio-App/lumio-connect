[build]
  publish = "public"
  command = "npm install"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Routes API → fonctions
[[redirects]]
  from   = "/api/session-create"
  to     = "/.netlify/functions/session-create"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/session-status/*"
  to     = "/.netlify/functions/session-status"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/session-submit/*"
  to     = "/.netlify/functions/session-submit"
  status = 200
  force  = true

# /c/TOKEN → page iPhone
[[redirects]]
  from   = "/c/*"
  to     = "/connect.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
